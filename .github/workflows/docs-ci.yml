name: Docs CI

on:
  pull_request:
    paths:
      - "docs/**"
      - "src/**"
      - "static/**"
      - "i18n/**"
      - "blog/**"
      - "docusaurus.config.ts"
      - "sidebars.ts"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/docs-ci.yml"
      - ".github/workflows/azure-static-web-apps-pos-x1-docs.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        run: npm run build
