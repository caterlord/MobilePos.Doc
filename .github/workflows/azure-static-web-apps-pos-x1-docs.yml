name: Azure Static Web Apps CI/CD

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "src/**"
      - "static/**"
      - "i18n/**"
      - "blog/**"
      - "docusaurus.config.ts"
      - "sidebars.ts"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/azure-static-web-apps-pos-x1-docs.yml"

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_POS_X1_DOCS }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"
          api_location: ""
          output_location: "build"
        env:
          DOCS_SITE_URL: ${{ vars.DOCS_SITE_URL }}
          DOCS_BASE_URL: ${{ vars.DOCS_BASE_URL }}
